<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
  <title>AI Reader</title>
  <!-- TEST123 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/misans@4.0.0/lib/Normal/MiSans-Normal.min.css">
  <link rel="stylesheet" crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/misans@4.0.0/lib/Normal/MiSans-Bold.min.css">
  <link rel="stylesheet" href="style.css?v=20260310-8" />
</head>

<body>
  <div class="app">
    <div class="wrap">

      <header class="top">
        <div class="brand">
          <div class="logo">小马哥</div>
          <div>
            <h1 class="title">AI读者</h1>
            <p class="sub">告别机械声，古文/外语自动翻译</p>
          </div>
        </div>
        <button id="shelfBtn" class="shelf-btn" title="书架">📚</button>
      </header>

 <!-- 卡片 1：模式 + 朗读者 + 语速 -->
<section class="card">
  <div class="grid3">
    <div class="field modeField">
      <label for="modeSelect">朗读模式</label>
      <select id="modeSelect" class="chunk-select">
        <option value="original">原文朗读</option>
        <option value="story" selected>改成故事（更口语，有趣）</option>
        <option value="translate">翻译为白话/中文</option>
      </select>
    </div>

    <div class="field voiceField">
      <label for="voiceSelect">朗读者</label>
      <select id="voiceSelect" class="chunk-select">
  <option value="young_female">青年女</option>
  <option value="girl">少女</option>
  <option value="young_male">青年男</option>
  <option value="elder_male" selected>中老年男</option>
</select>
    </div>

    <div class="field speedField">
      <label for="speedSelect">语速</label>
      <select id="speedSelect" class="chunk-select">
        <option value="0.8">0.8x</option>
        <option value="1" selected>1x</option>
        <option value="1.2">1.2x</option>
        <option value="1.5">1.5x</option>
      </select>
    </div>
  </div>
</section>

<!-- 卡片 4：正文 + 操作 -->
      <section class="card">
        <div class="card-hd">
          <div class="card-title">文字/YouTube链接</div>
        </div>

        <label class="sr-only" for="textInput">正文</label>
        <textarea id="textInput" placeholder="可粘贴文字或外语YouTube视频链接"></textarea>

        <div class="actions">
          <button id="generateBtn" class="btn primary">生成并播放</button>

          <button id="playPauseBtn" class="btn secondary playpause" type="button">
          ▶ 播放
          </button>

         <select id="sleepTimer" class="sleep-select chunk-select">
            <option value="0">定时关闭</option>
            <option value="600">10 分钟</option>
            <option value="1800">30 分钟</option>
            <option value="3600">60 分钟</option>
            <option value="end">本段结束</option>
         </select>
      </div>

       <div class="progress">
  <progress id="progressBar" value="0" max="100"></progress>
  <div class="progress-row">
    <div id="chunkNav" class="chunk-nav"></div>
    <div id="statusText" class="status info">就绪</div>
  </div>
</div>
      </section>

      <!-- 卡片 2：上传 -->
      <section class="card">
        <div class="card-hd">
         <div class="card-title">
            上传文件
            <span class="inline-hint">提示：大文件建议先测试小段</span>
         </div>
       </div>

        <label class="sr-only" for="fileInput">选择文件</label>
        <input class="file" type="file" id="fileInput" accept=".txt,.docx,.pdf">
      </section>

      <div class="spacer"></div>

    <!-- 书架底部抽屉 -->
    <div id="sheetOverlay" class="sheet-overlay"></div>
    <div id="sheetDrawer" class="sheet-drawer">
      <div class="sheet-handle"></div>
      <div class="sheet-header">书架</div>
      <div id="bookList" class="book-list"></div>
      <div class="sheet-footer">
        <button id="addBookBtn" class="sheet-add-btn">＋ 添加新书</button>
      </div>
    </div>

    <!-- 底部播放器 -->
    <footer class="playerbar">
      <div class="wrap player-inner">
        <div class="player-title">播放器</div>
        <audio id="audioPlayer" controls></audio>
      </div>
    </footer>
  </div>

 <script type="module" src="./app.js?v=20260311-5"></script>

</body>
</html>
